<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buku Tamu DPMPTSP Kota Samarinda</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<form
    class="login-container"
    id="guest-form"
>

    <h1>
        Selamat Datang di Dinas Penanaman Modal dan Pelayanan Terpadu Satu Pintu Kota Samarinda
    </h1>


    <!-- NAMA -->
    <div class="input-group">

        <label for="nama">
            Nama Lengkap *
        </label>

        <input
            type="text"
            id="nama"
            name="entry.1994765778"
            placeholder="Masukkan nama lengkap"
            required
        >

    </div>


    <!-- WAKTU KUNJUNGAN -->
    <div class="input-group">

        <label>
            Waktu Kunjungan
        </label>

        <div class="time-picker">

            <!-- JAM -->
            <div class="wheel">
                <div
                    class="wheel-slot"
                    id="hour-wheel">
                </div>
            </div>


            <span class="time-separator">
                :
            </span>


            <!-- MENIT -->
            <div class="wheel">
                <div
                    class="wheel-slot"
                    id="minute-wheel">
                </div>
            </div>


            <!-- WAKTU UNTUK GOOGLE FORM -->
            <input
                type="hidden"
                id="entry-time"
                name="entry.174173773"
            >

        </div>

    </div>


    <!-- ASAL INSTANSI -->
    <div class="input-group">

        <label for="asal">
            Asal Instansi/Perusahaan
        </label>

        <input
            type="text"
            id="asal"
            name="entry.260225900"
            placeholder="Masukkan asal instansi atau perusahaan"
        >

    </div>


    <!-- BIDANG / ORANG YANG DITEMUI -->
    <div class="input-group">

        <label for="bidang">
            Bidang/Orang yang Ditemui
        </label>

        <input
            type="text"
            id="bidang"
            name="entry.207353417"
            placeholder="Masukkan bidang atau orang yang ditemui"
        >

    </div>


    <!-- KEPERLUAN -->
    <div class="input-group">

        <label for="keperluan">
            Keperluan
        </label>

        <input
            type="text"
            id="keperluan"
            name="entry.1206615531"
            placeholder="Masukkan keperluan kunjungan"
        >

    </div>


    <!-- JUMLAH ORANG -->
    <div class="input-group">

        <label>
            Jumlah Orang
        </label>


        <div class="radio-group">


            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="1 orang"
                    required
                >

                <span>
                    1 orang
                </span>

            </label>


            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="2 orang"
                >

                <span>
                    2 orang
                </span>

            </label>


            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="3 orang"
                >

                <span>
                    3 orang
                </span>

            </label>


            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="4 orang"
                >

                <span>
                    4 orang
                </span>

            </label>


            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="5-10 orang"
                >

                <span>
                    5-10 orang
                </span>

            </label>


            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value=">10 orang"
                >

                <span>
                    &gt;10 orang
                </span>

            </label>


        </div>

    </div>


    <!-- TOMBOL KIRIM -->

    <button
        type="submit"
        id="submit-button"
    >
        KIRIM
    </button>


</form>



<script>

    /* =====================================
       ELEMENT
    ===================================== */

    const form =
        document.getElementById(
            'guest-form'
        );


    const hourWheel =
        document.getElementById(
            'hour-wheel'
        );


    const minuteWheel =
        document.getElementById(
            'minute-wheel'
        );


    const entryTime =
        document.getElementById(
            'entry-time'
        );


    const submitButton =
        document.getElementById(
            'submit-button'
        );



    /* =====================================
       GOOGLE FORM URL
    ===================================== */

    const GOOGLE_FORM_URL =

        'https://docs.google.com/forms/d/e/1FAIpQLSfSnZY7ouhCXkppMBQvXSiP9w2mZi6v4HyhIBPrVaCNlmq4Ow/formResponse';



    /* =====================================
       FORMAT 2 DIGIT
    ===================================== */

    function pad(value) {

        return String(value)
            .padStart(
                2,
                '0'
            );

    }



    /* =====================================
       BUAT ITEM JAM / MENIT
    ===================================== */

    function createItems(
        container,
        count
    ) {

        for (
            let i = 0;
            i < count;
            i++
        ) {

            const item =
                document.createElement(
                    'div'
                );


            item.className =
                'wheel-item';


            item.textContent =
                pad(i);


            item.dataset.value =
                pad(i);


            container.appendChild(
                item
            );

        }

    }



    /* =====================================
       PILIH ITEM
    ===================================== */

    function selectItem(
        container,
        index
    ) {

        const items =
            container.querySelectorAll(
                '.wheel-item'
            );


        items.forEach(

            item =>

                item.classList.remove(
                    'active'
                )

        );


        if (items[index]) {

            items[index]
                .classList.add(
                    'active'
                );


            items[index]
                .scrollIntoView({

                    block:
                        'center',

                    behavior:
                        'smooth'

                });

        }


        updateTime();

    }



    /* =====================================
       UPDATE WAKTU
    ===================================== */

    function updateTime() {

        const hour =

            hourWheel
                .querySelector(
                    '.wheel-item.active'
                );


        const minute =

            minuteWheel
                .querySelector(
                    '.wheel-item.active'
                );


        if (
            hour &&
            minute
        ) {

            entryTime.value =

                hour.dataset.value

                +

                ':'

                +

                minute.dataset.value;

        }

    }



    /* =====================================
       EVENT WHEEL
    ===================================== */

    function bindWheel(
        container
    ) {

        const items =

            container
                .querySelectorAll(
                    '.wheel-item'
                );


        items.forEach(

            (
                item,
                index
            ) => {


                item.addEventListener(

                    'click',

                    function () {


                        selectItem(

                            container,

                            index

                        );


                    }

                );


            }

        );

    }



    /* =====================================
       BUAT JAM & MENIT
    ===================================== */

    createItems(
        hourWheel,
        24
    );


    createItems(
        minuteWheel,
        60
    );


    bindWheel(
        hourWheel
    );


    bindWheel(
        minuteWheel
    );



    /* =====================================
       SET WAKTU SEKARANG
    ===================================== */

    const now =
        new Date();


    selectItem(

        hourWheel,

        now.getHours()

    );


    selectItem(

        minuteWheel,

        now.getMinutes()

    );



    /* =====================================
       SUBMIT FORM
    ===================================== */

    form.addEventListener(

        'submit',

        async function (
            event
        ) {


            /*

            CEGAH FORM PINDAH
            KE GOOGLE FORM

            */

            event.preventDefault();



            /*

            UPDATE WAKTU
            SAAT KIRIM

            */

            const now =
                new Date();


            entryTime.value =

                pad(
                    now.getHours()
                )

                +

                ':'

                +

                pad(
                    now.getMinutes()
                );



            /*

            MATIKAN TOMBOL
            AGAR TIDAK DOUBLE SUBMIT

            */

            submitButton.disabled =
                true;


            submitButton.textContent =
                'MENGIRIM...';



            /*

            AMBIL SEMUA DATA FORM

            */

            const formData =

                new FormData(
                    form
                );



            try {


                /*

                KIRIM DATA
                KE GOOGLE FORM

                */

                await fetch(

                    GOOGLE_FORM_URL,

                    {

                        method:
                            'POST',

                        mode:
                            'no-cors',

                        body:
                            formData

                    }

                );



                /*

                JIKA REQUEST
                SUDAH DIKIRIM

                REDIRECT KE
                SELESAI.HTML

                */

                window.location.href =

                    'selesai.html';


            }

            catch (
                error
            ) {


                console.error(
                    error
                );


                alert(

                    'Data gagal dikirim. Silakan coba lagi.'

                );


                submitButton.disabled =
                    false;


                submitButton.textContent =
                    'KIRIM';


            }


        }

    );


</script>


</body>
</html>
