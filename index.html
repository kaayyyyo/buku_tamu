<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Buku Tamu DPMPTSP Kota Samarinda</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<form
    class="login-container"
    id="guest-form"
    method="POST"
    action="https://docs.google.com/forms/d/e/1FAIpQLSfSnZY7ouhCXkppMBQvXSiP9w2mZi6v4HyhIBPrVaCNlmq4Ow/formResponse"
    target="submitFrame"
>

    <h1>
        Selamat Datang di Dinas Penanaman Modal dan Pelayanan Terpadu Satu Pintu Kota Samarinda
    </h1>


    <!-- NAMA LENGKAP -->
    <div class="input-group">

        <label for="nama">
            Nama Lengkap *
        </label>

        <input
            type="text"
            id="nama"
            name="entry.1994765778"
            placeholder="Masukkan nama lengkap"
            required
        >

    </div>


    <!-- WAKTU KUNJUNGAN -->
    <div class="input-group">

        <label>
            Waktu Kunjungan
        </label>

        <div class="time-picker" id="time-picker">

            <!-- JAM -->
            <div class="wheel">

                <div
                    class="wheel-slot"
                    id="hour-wheel"
                    tabindex="0"
                    aria-label="Jam"
                    role="listbox">
                </div>

            </div>


            <span class="time-separator">
                :
            </span>


            <!-- MENIT -->
            <div class="wheel">

                <div
                    class="wheel-slot"
                    id="minute-wheel"
                    tabindex="0"
                    aria-label="Menit"
                    role="listbox">
                </div>

            </div>


            <!--
                FORMAT WAKTU GOOGLE FORM
                Contoh: 09:30
            -->

            <input
                type="hidden"
                id="entry-time"
                name="entry.174173773"
                value="08:00"
            >

        </div>

    </div>


    <!-- ASAL INSTANSI -->
    <div class="input-group">

        <label for="asal">
            Asal Instansi/Perusahaan
        </label>

        <input
            type="text"
            id="asal"
            name="entry.260225900"
            placeholder="Masukkan asal instansi atau perusahaan"
        >

    </div>


    <!-- BIDANG / ORANG YANG DITEMUI -->
    <div class="input-group">

        <label for="bidang">
            Bidang/Orang yang Ditemui
        </label>

        <input
            type="text"
            id="bidang"
            name="entry.207353417"
            placeholder="Masukkan bidang atau orang yang ditemui"
        >

    </div>


    <!-- KEPERLUAN -->
    <div class="input-group">

        <label for="keperluan">
            Keperluan
        </label>

        <input
            type="text"
            id="keperluan"
            name="entry.1206615531"
            placeholder="Masukkan keperluan kunjungan"
        >

    </div>


    <!-- JUMLAH ORANG -->
    <div class="input-group">

        <label>
            Jumlah Orang
        </label>

        <div class="radio-group">


            <!-- 1 ORANG -->
            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="1 orang"
                >

                <span>
                    1 orang
                </span>

            </label>


            <!-- 2 ORANG -->
            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="2 orang"
                >

                <span>
                    2 orang
                </span>

            </label>


            <!-- 3 ORANG -->
            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="3 orang"
                >

                <span>
                    3 orang
                </span>

            </label>


            <!-- 4 ORANG -->
            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="4 orang"
                >

                <span>
                    4 orang
                </span>

            </label>


            <!-- 5 - 10 ORANG -->
            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value="5-10 orang"
                >

                <span>
                    5-10 orang
                </span>

            </label>


            <!-- LEBIH DARI 10 ORANG -->
            <label class="radio-option">

                <input
                    type="radio"
                    name="entry.1699570348"
                    value=">10 orang"
                >

                <span>
                    &gt;10 orang
                </span>

            </label>


        </div>

    </div>


    <!-- TOMBOL KIRIM -->

    <button type="submit">
        KIRIM
    </button>


</form>


<!--
    IFRAME TERSEMBUNYI

    Google Form akan dikirim ke iframe
    sehingga pengguna tidak berpindah
    ke halaman Google Form
-->

<iframe
    name="submitFrame"
    id="submitFrame"
    style="display:none;">
</iframe>



<script>

    /* ================================
       MENGAMBIL ELEMENT HTML
    ================================= */

    const form =
        document.getElementById('guest-form');

    const hourWheel =
        document.getElementById('hour-wheel');

    const minuteWheel =
        document.getElementById('minute-wheel');

    const entryTime =
        document.getElementById('entry-time');



    /* ================================
       FORMAT ANGKA MENJADI 2 DIGIT

       8  -> 08
       9  -> 09
       10 -> 10
    ================================= */

    function pad(value) {

        return String(value).padStart(2, '0');

    }



    /* ================================
       MEMBUAT ITEM JAM DAN MENIT
    ================================= */

    function createItems(container, count) {

        for (let i = 0; i < count; i++) {

            const item =
                document.createElement('div');

            item.className =
                'wheel-item';

            item.textContent =
                pad(i);

            item.dataset.value =
                pad(i);

            container.appendChild(item);

        }

    }



    /* ================================
       UPDATE WAKTU UNTUK GOOGLE FORM

       FORMAT:
       HH:MM

       Contoh:
       09:30
    ================================= */

    function updateHiddenValue() {

        const selectedHour =
            hourWheel.querySelector(
                '.wheel-item.active'
            );

        const selectedMinute =
            minuteWheel.querySelector(
                '.wheel-item.active'
            );


        if (
            selectedHour &&
            selectedMinute
        ) {

            entryTime.value =
                selectedHour.dataset.value
                +
                ':'
                +
                selectedMinute.dataset.value;

        }

    }



    /* ================================
       MEMILIH ITEM JAM / MENIT
    ================================= */

    function selectItem(
        container,
        index,
        smooth = true
    ) {

        const items =
            container.querySelectorAll(
                '.wheel-item'
            );


        items.forEach(
            item =>
                item.classList.remove(
                    'active'
                )
        );


        const selected =
            items[index];


        if (selected) {

            selected.classList.add(
                'active'
            );


            selected.scrollIntoView({

                block: 'center',

                behavior:
                    smooth
                    ? 'smooth'
                    : 'auto'

            });

        }

    }



    /* ================================
       EVENT KLIK WHEEL
    ================================= */

    function bindWheel(
        container,
        defaultIndex
    ) {

        const items =
            container.querySelectorAll(
                '.wheel-item'
            );


        items.forEach(
            (item, index) => {

                item.addEventListener(
                    'click',
                    () => {

                        selectItem(
                            container,
                            index
                        );

                        updateHiddenValue();

                    }
                );

            }
        );


        selectItem(
            container,
            defaultIndex,
            false
        );

    }



    /* ================================
       SET WAKTU OTOMATIS

       Saat pengunjung menekan KIRIM,
       waktu akan mengikuti waktu
       perangkat saat itu.
    ================================= */

    function setSubmitTime() {

        const now =
            new Date();


        const hour =
            pad(
                now.getHours()
            );


        const minute =
            pad(
                now.getMinutes()
            );


        entryTime.value =
            hour
            +
            ':'
            +
            minute;


        selectItem(
            hourWheel,
            now.getHours(),
            false
        );


        selectItem(
            minuteWheel,
            now.getMinutes(),
            false
        );

    }



    /* ================================
       MEMBUAT WHEEL

       JAM   : 00 - 23
       MENIT : 00 - 59
    ================================= */

    createItems(
        hourWheel,
        24
    );


    createItems(
        minuteWheel,
        60
    );



    /* ================================
       WAKTU DEFAULT

       Jam   : 08
       Menit : 00
    ================================= */

    bindWheel(
        hourWheel,
        8
    );


    bindWheel(
        minuteWheel,
        0
    );


    updateHiddenValue();



    /* ================================
       PROSES SUBMIT
    ================================= */

    form.addEventListener(
        'submit',
        function () {

            /*
                Ambil waktu saat tombol
                KIRIM ditekan
            */

            setSubmitTime();


            /*
                Tunggu Google Form
                menerima data sebelum
                pindah halaman
            */

            setTimeout(
                function () {

                    window.location.href =
                        'selesai.html';

                },

                1500

            );

        }
    );


</script>


</body>
</html>
